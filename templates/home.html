<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Student Performance Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:Poppins,sans-serif;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            min-height:100vh;
        }

        .card{

            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);

        }

        h1{

            font-weight:700;

        }

        .btn-custom{

            background:#6C63FF;
            color:white;
            font-weight:bold;

        }

        .btn-custom:hover{

            background:#574bdb;
            color:white;

        }

        .prediction{

            background:#e8fff0;
            border-left:6px solid green;
            padding:15px;
            border-radius:10px;
            margin-top:20px;
            font-size:25px;
            font-weight:bold;
            color:green;

        }

    </style>

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card p-5">

<h1 class="text-center text-primary mb-4">
🎓 Student Exam Performance Indicator
</h1>

<form action="{{ url_for('predict_datapoint') }}" method="POST">

<div class="mb-3">

<label class="form-label">Gender</label>

<select class="form-select" name="gender" required>

<option selected disabled>Select Gender</option>

<option value="male">Male</option>

<option value="female">Female</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Race / Ethnicity</label>

<select class="form-select" name="ethnicity" required>

<option selected disabled>Select</option>

<option value="group A">Group A</option>

<option value="group B">Group B</option>

<option value="group C">Group C</option>

<option value="group D">Group D</option>

<option value="group E">Group E</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Parental Education</label>

<select class="form-select" name="parental_level_of_education" required>

<option selected disabled>Select</option>

<option value="associate's degree">Associate's Degree</option>

<option value="bachelor's degree">Bachelor's Degree</option>

<option value="high school">High School</option>

<option value="master's degree">Master's Degree</option>

<option value="some college">Some College</option>

<option value="some high school">Some High School</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Lunch Type</label>

<select class="form-select" name="lunch" required>

<option selected disabled>Select</option>

<option value="standard">Standard</option>

<option value="free/reduced">Free / Reduced</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Test Preparation Course</label>

<select class="form-select" name="test_preparation_course" required>

<option selected disabled>Select</option>

<option value="completed">Completed</option>

<option value="none">None</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Reading Score</label>

<input
class="form-control"
type="number"
name="reading_score"
min="0"
max="100"
required>

</div>

<div class="mb-4">

<label class="form-label">Writing Score</label>

<input
class="form-control"
type="number"
name="writing_score"
min="0"
max="100"
required>

</div>

<div class="d-grid">

<button class="btn btn-custom btn-lg">

Predict Maths Score

</button>

</div>

</form>

{% if results %}

<div class="prediction text-center">

Predicted Maths Score

<br><br>

{{ results }}

</div>

{% endif %}

</div>

</div>

</div>

</div>

</body>

</html>
